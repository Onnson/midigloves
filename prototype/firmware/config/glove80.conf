# Glove80 Instrument Mode — Bridge 1.5 + Device 0.5
# darknao/zmk fork (rgb-layer-25.08)

# Per-key RGB underglow layer (darknao fork feature)
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_EXPERIMENTAL_RGB_LAYER=y

# Sync layer state to peripheral (RH) for split RGB + layer tracking
CONFIG_ZMK_SPLIT_PERIPHERAL_HID_INDICATORS=y

# RGB brightness/saturation maxed (BRT_MAX=80 is hardware safety limit)
CONFIG_ZMK_RGB_UNDERGLOW_SAT_START=100
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=80

# Auto-off RGB on idle to save battery
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
CONFIG_ZMK_IDLE_TIMEOUT=90000

# NKRO — required for full chord support (>6 simultaneous keys)
CONFIG_ZMK_HID_REPORT_TYPE_NKRO=y

# Low debounce for instrument responsiveness
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

# Fast split BLE latency
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=6

# Instrument mode — dynamic chromatic RGB
CONFIG_ZMK_INSTRUMENT_MODE=y
CONFIG_ZMK_INSTRUMENT_LAYER=3
